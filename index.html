async function startAudioRecording() {
    if (!auth.currentUser) {
        alert('Faça login para enviar áudio');
        return;
    }
    
    if (!currentChatUser && currentChat !== 'geral') {
        alert('Selecione uma conversa primeiro');
        return;
    }
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (event) => {
            audioChunks.push(event.data);
        };
        
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            await sendAudioMessage(audioBlob);
            
            // Parar todas as tracks
            stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        isRecording = true;
        
        // Mudar ícone do botão
        const recordBtn = document.getElementById('audioRecordBtn');
        recordBtn.innerHTML = '<i data-lucide="square"></i>';
        recordBtn.classList.add('recording');
        recordBtn.onclick = stopAudioRecording;
        
        lucide.createIcons();
        
        // Timeout de 60 segundos
        setTimeout(() => {
            if (isRecording) {
                stopAudioRecording();
            }
        }, 60000);
        
    } catch (error) {
        console.error('Erro ao acessar microfone:', error);
        alert('Não foi possível acessar o microfone. Verifique as permissões.');
    }
}

function stopAudioRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        
        // Restaurar botão
        const recordBtn = document.getElementById('audioRecordBtn');
        recordBtn.innerHTML = '<i data-lucide="mic"></i>';
        recordBtn.classList.remove('recording');
        recordBtn.onclick = startAudioRecording;
        
        lucide.createIcons();
    }
}

async function sendAudioMessage(audioBlob) {
    const user = auth.currentUser;
    
    // Upload do áudio
    const formData = new FormData();
    formData.append('file', audioBlob);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    formData.append('resource_type', 'video'); // Cloudinary trata áudio como vídeo
    
    try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`, {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        const audioUrl = data.secure_url;
        const duration = Math.round(data.duration);
        
        const messageData = {
            text: '',
            user: user.uid,
            created: new Date(),
            audioUrl: audioUrl,
            audioDuration: duration,
            isAudio: true
        };
        
        if (currentChat === 'geral') {
            messageData.isGeral = true;
            await db.collection('chat').add(messageData);
        } else if (currentChatUser) {
            messageData.participants = [user.uid, currentChatUser].sort();
            await db.collection('private_chats').add(messageData);
        }
        
    } catch (error) {
        console.error('Erro ao enviar áudio:', error);
        alert('Erro ao enviar áudio. Tente novamente.');
    }
}

function playAudio(messageId, audioUrl) {
    const audio = new Audio(audioUrl);
    const audioElement = document.getElementById(`audio-${messageId}`);
    const progressBar = document.getElementById(`audio-progress-${messageId}`);
    const playBtn = document.getElementById(`play-btn-${messageId}`);
    
    audio.addEventListener('timeupdate', () => {
        if (progressBar) {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${progress}%`;
        }
    });
    
    audio.addEventListener('ended', () => {
        if (playBtn) {
            playBtn.innerHTML = '<i data-lucide="play"></i>';
            lucide.createIcons();
        }
        if (progressBar) {
            progressBar.style.width = '0%';
        }
    });
    
    if (audio.paused) {
        audio.play();
        if (playBtn) {
            playBtn.innerHTML = '<i data-lucide="pause"></i>';
            lucide.createIcons();
        }
    } else {
        audio.pause();
        if (playBtn) {
            playBtn.innerHTML = '<i data-lucide="play"></i>';
            lucide.createIcons();
        }
    }
}

async function confirmDelete() {
    console.log('Confirm delete iniciado. Post ID:', currentPostId, 'Type:', currentPostType);
    
    if (!currentPostId || !currentPostType) {
        console.error('Post ID ou tipo não definido');
        alert('Erro: Identificador do post não encontrado');
        closeConfirmModal();
        return;
    }
    
    try {
        const user = auth.currentUser;
        if (!user) {
            alert('Você precisa estar logado');
            closeConfirmModal();
            return;
        }
        
        // Determinar a referência do post baseado no tipo
        let postRef;
        let likesCollection;
        let commentsCollection;
        
        if (currentPostType === 'feed') {
            postRef = db.collection('posts').doc(currentPostId);
            likesCollection = 'post_likes';
            commentsCollection = 'post_comments';
            console.log('Excluindo post do feed:', currentPostId);
        } else if (currentPostType === 'forum') {
            postRef = db.collection('forum_posts').doc(currentPostId);
            likesCollection = 'forum_post_likes';
            commentsCollection = 'forum_comments';
            console.log('Excluindo post do fórum:', currentPostId);
        } else {
            console.error('Tipo de post inválido:', currentPostType);
            alert('Erro: Tipo de post inválido');
            closeConfirmModal();
            return;
        }
        
        // Verificar se o post existe e se o usuário é o dono
        console.log('Buscando post...');
        const postDoc = await postRef.get();
        
        if (!postDoc.exists) {
            console.error('Post não encontrado no Firestore');
            alert('Post não encontrado. Ele pode já ter sido excluído.');
            closeConfirmModal();
            
            // Recarregar os posts para atualizar a UI
            if (currentPostType === 'feed') {
                loadFeed();
            } else if (currentPostType === 'forum') {
                loadForumPosts();
            }
            return;
        }
        
        const postData = postDoc.data();
        console.log('Post encontrado. Dono:', postData.user, 'Usuário atual:', user.uid);
        
        // Verificar se o usuário atual é o dono do post
        if (postData.user !== user.uid) {
            alert('Você só pode excluir suas próprias postagens');
            closeConfirmModal();
            return;
        }
        
        // Usar batch para garantir que todas as operações sejam atômicas
        const batch = db.batch();
        
        // Excluir o post principal
        batch.delete(postRef);
        
        // Excluir likes associados
        console.log('Buscando likes para excluir...');
        const likes = await db.collection(likesCollection).where('postId', '==', currentPostId).get();
        console.log('Likes encontrados:', likes.size);
        likes.forEach(doc => {
            batch.delete(doc.ref);
        });
        
        // Excluir comentários associados
        console.log('Buscando comentários para excluir...');
        const comments = await db.collection(commentsCollection).where('postId', '==', currentPostId).get();
        console.log('Comentários encontrados:', comments.size);
        comments.forEach(doc => {
            batch.delete(doc.ref);
        });
        
        // Executar todas as exclusões em uma única operação atômica
        console.log('Executando batch commit...');
        await batch.commit();
        console.log('Batch commit concluído com sucesso');
        
        closeConfirmModal();
        alert('Postagem excluída com sucesso!');
        
        // Recarregar os posts
        if (currentPostType === 'feed') {
            loadFeed();
        } else if (currentPostType === 'forum') {
            loadForumPosts();
        }
        
    } catch (error) {
        console.error('Erro detalhado ao excluir post:', error);
        alert('Erro ao excluir postagem: ' + error.message);
    } finally {
        // Limpar as variáveis
        currentPostId = null;
        currentPostType = null;
    }
}

        menu.remove();

// Exclusão de comentários com deslize
function handleCommentTouchStart(event, commentId, element) {
    touchStartX = event.touches[0].clientX;
    currentCommentId = commentId;
    currentCommentElement = element;
}

function handleCommentTouchMove(event) {
    if (!currentCommentElement) return;
    
    const touchX = event.touches[0].clientX;
    const diffX = touchStartX - touchX;
    
    if (diffX > 30 && diffX < 100) {
        currentCommentElement.classList.add('swiped');
    } else if (diffX < -30) {
        currentCommentElement.classList.remove('swiped');
    }
}

function handleCommentTouchEnd() {
    // Se estiver swiped, o botão de excluir está visível
    currentCommentId = null;
    currentCommentElement = null;
}

        const commentElement = document.querySelector(`[data-comment-id="${currentCommentId}"]`);

async function followUser(userId) {
    if (!auth.currentUser) {
        alert('Faça login para seguir usuários');
        return;
    }
    
    const currentUserId = auth.currentUser.uid;
    
    if (userId === currentUserId) {
        return;
    }
    
    try {
        const followDoc = await db.collection('follows')
            .where('followerId', '==', currentUserId)
            .where('followingId', '==', userId)
            .get();
        
        if (followDoc.empty) {
            await db.collection('follows').add({
                followerId: currentUserId,
                followingId: userId,
                createdAt: new Date()
            });
            
            await updateFollowersCount(userId);
            await updateFollowingCount(currentUserId);
            
            const actionBtn = document.getElementById('profileActionBtn');
            if (actionBtn) {
                actionBtn.innerText = 'Seguindo';
                actionBtn.className = 'profile-action-btn following';
                actionBtn.onclick = () => unfollowUser(userId);
            }
            
            alert('Usuário seguido com sucesso!');
        }
    } catch (error) {
        console.error('Erro ao seguir:', error);
        alert('Erro ao seguir usuário. Tente novamente.');
    }
}

async function unfollowUser(userId) {
    if (!auth.currentUser) return;
    
    const currentUserId = auth.currentUser.uid;
    
    try {
        const followDoc = await db.collection('follows')
            .where('followerId', '==', currentUserId)
            .where('followingId', '==', userId)
            .get();
        
        if (!followDoc.empty) {
            await db.collection('follows').doc(followDoc.docs[0].id).delete();
            
            await updateFollowersCount(userId);
            await updateFollowingCount(currentUserId);
            
            const actionBtn = document.getElementById('profileActionBtn');
            if (actionBtn) {
                actionBtn.innerText = 'Seguir';
                actionBtn.className = 'profile-action-btn primary';
                actionBtn.onclick = () => followUser(userId);
            }
            
            alert('Você deixou de seguir este usuário');
        }
    } catch (error) {
        console.error('Erro ao deixar de seguir:', error);
        alert('Erro ao processar. Tente novamente.');
    }
}

async function updateFollowersCount(userId) {
    try {
        const followersSnapshot = await db.collection('follows')
            .where('followingId', '==', userId)
            .get();
        
        const count = followersSnapshot.size;
        
        await db.collection('users').doc(userId).update({
            followersCount: count
        });
        
        if (viewingProfileId === userId || userId === auth.currentUser?.uid) {
            document.getElementById('profileFollowers').innerText = count;
        }
        
        followersCache.set(userId, count);
    } catch (error) {
        console.error('Erro ao atualizar contagem de seguidores:', error);
    }
}

async function updateFollowingCount(userId) {
    try {
        const followingSnapshot = await db.collection('follows')
            .where('followerId', '==', userId)
            .get();
        
        const count = followingSnapshot.size;
        
        await db.collection('users').doc(userId).update({
            followingCount: count
        });
        
        if (viewingProfileId === userId || userId === auth.currentUser?.uid) {
            document.getElementById('profileFollowing').innerText = count;
        }
        
        followingCache.set(userId, count);
    } catch (error) {
        console.error('Erro ao atualizar contagem de seguindo:', error);
    }
}

async function checkIfFollowing(targetUserId) {
    if (!auth.currentUser) return false;
    
    const currentUserId = auth.currentUser.uid;
    
    try {
        const followDoc = await db.collection('follows')
            .where('followerId', '==', currentUserId)
            .where('followingId', '==', targetUserId)
            .get();
        
        return !followDoc.empty;
    } catch (error) {
        console.error('Erro ao verificar follow:', error);
        return false;
    }
}

async function loadFollowersCount(userId) {
    if (followersCache.has(userId)) {
        return followersCache.get(userId);
    }
    
    try {
        const snapshot = await db.collection('follows')
            .where('followingId', '==', userId)
            .get();
        
        const count = snapshot.size;
        followersCache.set(userId, count);
        return count;
    } catch (error) {
        console.error('Erro ao carregar seguidores:', error);
        return 0;
    }
}

async function loadFollowingCount(userId) {
    if (followingCache.has(userId)) {
        return followingCache.get(userId);
    }
    
    try {
        const snapshot = await db.collection('follows')
            .where('followerId', '==', userId)
            .get();
        
        const count = snapshot.size;
        followingCache.set(userId, count);
        return count;
    } catch (error) {
        console.error('Erro ao carregar seguindo:', error);
        return 0;
    }
}

function handleProfileAction() {
    if (viewingProfileId && viewingProfileId !== auth.currentUser?.uid) {
        const actionBtn = document.getElementById('profileActionBtn');
        if (actionBtn.innerText === 'Seguir') {
            followUser(viewingProfileId);
        } else {
            unfollowUser(viewingProfileId);
        }
    } else {
        toggleEditProfile();
    }
}

function sendLike() {
    if (!auth.currentUser) return;
    
    if (currentChat === 'geral') {
        db.collection('chat').add({
            text: '❤️',
            user: auth.currentUser.uid,
            created: new Date(),
            isLike: true

async function uploadImageToCloudinary(file, onProgress) {
    return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, true);
        
        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable && onProgress) {
                const percent = (e.loaded / e.total) * 100;
                onProgress(percent);
            }
        };
        
        xhr.onload = () => {
            if (xhr.status === 200) {
                const response = JSON.parse(xhr.responseText);
                resolve(response.secure_url);
            } else {
                reject(new Error('Upload failed'));
            }
        };
        
        xhr.onerror = () => reject(new Error('Upload failed'));
        xhr.send(formData);
    });
}

function updateUserOnlineStatus() {
    if (!auth.currentUser) return;
    db.collection('users').doc(auth.currentUser.uid).update({
        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(console.error);
}

function isUserOnline(lastSeen) {
    if (!lastSeen) return false;
    let lastSeenDate;
    if (lastSeen && typeof lastSeen === 'object' && lastSeen.seconds) {
        lastSeenDate = new Date(lastSeen.seconds * 1000);
    } else if (lastSeen instanceof Date) {
        lastSeenDate = lastSeen;
    } else {
        return false;
    }
    const now = new Date();
    const diffSec = Math.floor((now - lastSeenDate) / 1000);
    return diffSec < 5;
}

function getLastSeenText(timestamp) {
    if (!timestamp) return 'Offline';
    let lastSeenDate;
    if (timestamp && typeof timestamp === 'object' && timestamp.seconds) {
        lastSeenDate = new Date(timestamp.seconds * 1000);
    } else if (timestamp instanceof Date) {
        lastSeenDate = timestamp;
    } else {
        return 'Offline';
    }
    const now = new Date();
    const diffSec = Math.floor((now - lastSeenDate) / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffH = Math.floor(diffMin / 60);
    const diffD = Math.floor(diffH / 24);
    
    if (diffSec < 5) return 'Online';
    if (diffMin < 60) return `visto há ${diffMin} min`;
    if (diffH < 24) return `visto há ${diffH} h`;
    if (diffD === 1) return 'visto ontem';
    if (diffD < 7) return `visto há ${diffD} dias`;
    return `visto em ${lastSeenDate.toLocaleDateString('pt-BR')}`;
}

function updateUserOnlineStatusUI(userId) {
    if (!userId || userId === 'geral') return;
    const usersList = document.getElementById('chatUsersList');
    const userItem = usersList?.querySelector(`[data-user-id="${userId}"]`);
    if (!userItem) return;
    const userInfoSpan = userItem.querySelector('.chat-user-info span:last-child');
    const avatarDiv = userItem.querySelector('.chat-user-avatar');
    const userData = userCache.get(userId);
    if (userData && userData.lastSeen) {
        const isOnline = isUserOnline(userData.lastSeen);
        const lastSeenText = getLastSeenText(userData.lastSeen);
        if (userInfoSpan) userInfoSpan.textContent = lastSeenText;
        if (isOnline) avatarDiv.classList.add('online');
        else avatarDiv.classList.remove('online');
    }
    if (currentChatUser === userId) updateChatHeaderStatus(userId);
}

function updateChatHeaderStatus(userId) {

    if (!userId || userId === 'geral' || userStatusListeners.has(userId)) return;

function register() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    
    if (!username || !username.startsWith('@')) {

        return;
    }
    if (!email || !password) {

        return;
    }
    
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = 'Cadastrando...';
    btn.disabled = true;
    
    db.collection('users').where('username', '==', username).get()
        .then(snapshot => {
            if (!snapshot.empty) throw new Error('Username já existe');
            return auth.createUserWithEmailAndPassword(email, password);
        })
        .then(userCredential => {
            return db.collection('users').doc(userCredential.user.uid).set({
                username: username,
                email: email,

                link: '',
                displayName: '',

                avatarUrl: '',
                followersCount: 0,
                followingCount: 0,
                createdAt: new Date(),
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => userCredential);
        })
        .then(() => {
            alert('Conta criada com sucesso!');
            showLogin();

        .catch(error => {

            btn.disabled = false;

            else if (error.code === 'auth/email-already-in-use') alert('Email já usado');

                    document.getElementById('profileAvatarImage').style.display = 'none';
                    document.getElementById('profileAvatarText').innerText = userData.displayName ? userData.displayName.charAt(0).toUpperCase() : (userData.username ? userData.username.charAt(1).toUpperCase() : 'U');

                const followingCount = await loadFollowingCount(userId);
                document.getElementById('profileFollowers').innerText = followersCount;
                document.getElementById('profileFollowing').innerText = followingCount;

function loadFeedComments(postId) {
    const commentsList = document.getElementById('comments-list-' + postId);
    if (!commentsList) return;
    
    commentsList.innerHTML = '<div style="text-align: center; padding: 10px;">Carregando comentários...</div>';
    
    db.collection('post_comments')
        .where('postId', '==', postId)
        .get()
        .then(async snapshot => {
            if (snapshot.empty) {
                commentsList.innerHTML = '<div style="text-align: center; padding: 10px; color: var(--text-secondary);">Nenhum comentário ainda. Seja o primeiro!</div>';
                return;
            }
            
            const comments = [];
            for (const doc of snapshot.docs) {
                const comment = doc.data();
                comment.id = doc.id;
                comments.push(comment);
            }
            
            comments.sort((a, b) => {
                const dateA = a.created ? new Date(a.created.seconds * 1000) : new Date(0);
                const dateB = b.created ? new Date(b.created.seconds * 1000) : new Date(0);
                return dateB - dateA;
            });
            
            let html = '';
            for (const comment of comments) {
                let userData = userCache.get(comment.userId);
                if (!userData) {
                    try {
                        const userDoc = await db.collection('users').doc(comment.userId).get();
                        userData = userDoc.data();
                        userCache.set(comment.userId, userData);
                    } catch (e) {
                        userData = { username: '@usuario' };
                    }
                }
                
                const commentText = makeMentionsClickable(comment.text);
                const isOwner = auth.currentUser && comment.userId === auth.currentUser.uid;
                
                html += `
                    <div class="comment-item" 
                         data-comment-id="${comment.id}" 
                         data-post-id="${postId}"
                         ${isOwner ? 'ontouchstart="handleCommentTouchStart(event, \'' + comment.id + '\', this)" ontouchmove="handleCommentTouchMove(event)" ontouchend="handleCommentTouchEnd()"' : ''}>
                        <div class="comment-avatar" onclick="viewProfile('${comment.userId}')">
                            ${userData?.avatarUrl ? `<img src="${userData.avatarUrl}" alt="Avatar">` : (userData?.username ? userData.username.charAt(1).toUpperCase() : 'U')}
                        </div>
                        <div class="comment-content">
                            <div class="comment-header">
                                <span class="comment-author" onclick="viewProfile('${comment.userId}')">${userData?.username || '@usuario'}</span>
                                <span class="comment-time">${formatTime(comment.created)}</span>
                            </div>
                            <div class="comment-text">${commentText}</div>
                        </div>
                        ${isOwner ? `
                        <div class="comment-delete-swipe" onclick="deleteCommentSwipe('${comment.id}')">
                            <i data-lucide="trash-2"></i>
                        </div>
                        ` : ''}
                    </div>
                `;
            }
            
            commentsList.innerHTML = html;
            lucide.createIcons();
        })
        .catch(error => {
            console.error('Erro ao carregar comentários:', error);
            commentsList.innerHTML = '<div style="text-align: center; padding: 10px; color: var(--danger);">Erro ao carregar comentários</div>';
        });
}

            });
            
            let html = '';
            for (const comment of comments) {
                let userData = userCache.get(comment.userId);
                if (!userData) {
                    try {
                        const userDoc = await db.collection('users').doc(comment.userId).get();
                        userData = userDoc.data();
                        userCache.set(comment.userId, userData);
                    } catch (e) {
                        userData = { username: '@usuario' };
                    }
                }
                
                const commentText = makeMentionsClickable(comment.text);
                const isOwner = auth.currentUser && comment.userId === auth.currentUser.uid;
                
                html += `
                    <div class="comment-item" 
                         data-comment-id="${comment.id}" 
                         data-post-id="${postId}"
                         ${isOwner ? 'ontouchstart="handleCommentTouchStart(event, \'' + comment.id + '\', this)" ontouchmove="handleCommentTouchMove(event)" ontouchend="handleCommentTouchEnd()"' : ''}>
                        <div class="comment-avatar" onclick="viewProfile('${comment.userId}')">
                            ${userData?.avatarUrl ? `<img src="${userData.avatarUrl}" alt="Avatar">` : (userData?.username ? userData.username.charAt(1).toUpperCase() : 'U')}
                        </div>
                        <div class="comment-content">
                            <div class="comment-header">
                                <span class="comment-author" onclick="viewProfile('${comment.userId}')">${userData?.username || '@usuario'}</span>
                                <span class="comment-time">${formatTime(comment.created)}</span>
                            </div>
                            <div class="comment-text">${commentText}</div>
                        </div>
                        ${isOwner ? `
                        <div class="comment-delete-swipe" onclick="deleteCommentSwipe('${comment.id}')">
                            <i data-lucide="trash-2"></i>
                        </div>
                        ` : ''}
                    </div>
                `;
            }
            
            commentsList.innerHTML = html;
            lucide.createIcons();
        })
        .catch(error => {
            console.error('Erro ao carregar comentários:', error);
            commentsList.innerHTML = '<div style="text-align: center; padding: 10px; color: var(--danger);">Erro ao carregar comentários</div>';
        });

function loadForumPosts() {
    const container = document.getElementById('forumPosts');
    container.innerHTML = '<div style="text-align: center; padding: 40px;">Carregando...</div>';
    
    db.collection('forum_posts')
        .where('category', '==', currentForum)
        .get()
        .then(async snapshot => {
            if (snapshot.empty) {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">Nenhum post ainda.</div>';
                return;
            }
            
            const posts = [];
            for (const doc of snapshot.docs) {
                const post = doc.data();
                const postId = doc.id;
                
                let userData = userCache.get(post.user);
                if (!userData) {
                    try {
                        const userDoc = await db.collection('users').doc(post.user).get();
                        userData = userDoc.data();
                        userCache.set(post.user, userData);
                    } catch (e) {
                        userData = { username: '@usuario' };
                    }
                }
                
                let userLiked = false;
                if (auth.currentUser) {
                    try {
                        const likeSnapshot = await db.collection('forum_post_likes')
                            .where('postId', '==', postId)
                            .where('userId', '==', auth.currentUser.uid)
                            .get();
                        userLiked = !likeSnapshot.empty;
                        forumLikesCache.set(postId, userLiked);
                    } catch (e) {
                        userLiked = false;
                    }
                }
                
                posts.push({
                    id: postId,
                    ...post,
                    userData: userData,
                    userLiked: userLiked,
                    createdDate: post.created ? new Date(post.created.seconds * 1000) : new Date(0)
                });
            }
            
            posts.sort((a, b) => b.createdDate - a.createdDate);
            
            container.innerHTML = '';
            
            posts.forEach(post => {
                const likedClass = post.userLiked ? 'liked' : '';
                const commentsVisibleClass = commentsVisible.get('forum-' + post.id) ? '' : 'hidden';
                const isOwner = auth.currentUser && post.user === auth.currentUser.uid;
                
                const postContent = makeMentionsClickable(post.text || '');
                const imageHtml = post.imageUrl ? `<img src="${post.imageUrl}" class="forum-post-image" onclick="expandImage('${post.imageUrl}')" alt="Post image">` : '';
                
                const postElement = document.createElement('div');
                postElement.className = 'forum-post';
                postElement.id = 'forum-post-' + post.id;
                postElement.innerHTML = `
                    <div class="forum-post-header">
                        <div class="post-avatar" onclick="viewProfile('${post.user}')">
                            ${post.userData?.avatarUrl ? `<img src="${post.userData.avatarUrl}" alt="Avatar">` : (post.userData?.username ? post.userData.username.charAt(1).toUpperCase() : 'U')}
                        </div>

                            <div class="forum-post-author" onclick="viewProfile('${post.user}')">${post.userData?.username || '@usuario'}</div>
                            <div class="forum-post-date">${formatDate(post.created)}</div>
                        </div>
                        ${isOwner ? `
                        <button class="forum-post-menu-btn" onclick="openPostOptions('${post.id}', 'forum')">
                            ⋯
                        </button>
                        ` : ''}
                    </div>
                    ${imageHtml}
                    <div class="forum-post-content">${postContent}</div>
                    <div class="forum-post-footer">
                        <button class="post-action ${likedClass}" onclick="toggleForumLike('${post.id}')" id="forum-like-${post.id}">
                            <i data-lucide="heart"></i>
                            <span id="forum-like-count-${post.id}">${post.likes || 0}</span>
                        </button>
                        <button class="post-action" onclick="toggleComments('${post.id}', 'forum')" id="forum-comment-btn-${post.id}">
                            <i data-lucide="message-circle"></i>
                            <span id="forum-comment-count-${post.id}">${post.comments || 0}</span>

                            <i data-lucide="share-2"></i>

                    </div>

                                <i data-lucide="send"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(postElement);
            });
            
            lucide.createIcons({
                attrs: {
                    fill: 'currentColor',
                    stroke: 'currentColor'
                }
            });
        })
        .catch(error => {
            console.error('Erro ao carregar posts:', error);
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--danger);">Erro ao carregar posts</div>';
        });

async function toggleForumLike(postId) {
    if (!auth.currentUser) {
        alert('Faça login para curtir');
        return;
    }
    
    const button = document.getElementById('forum-like-' + postId);
    const countSpan = document.getElementById('forum-like-count-' + postId);
    
    if (!button || !countSpan) return;
    if (button.disabled) return;
    
    button.disabled = true;
    
    try {
        const userId = auth.currentUser.uid;
        const snapshot = await db.collection('forum_post_likes')
            .where('postId', '==', postId)
            .where('userId', '==', userId)
            .get();
        
        const currentLikes = parseInt(countSpan.innerText) || 0;
        
        if (snapshot.empty) {
            button.classList.add('liked');
            countSpan.innerText = currentLikes + 1;
            forumLikesCache.set(postId, true);
            
            await db.collection('forum_post_likes').add({
                postId: postId,
                userId: userId,
                created: new Date()
            });
            
            await db.collection('forum_posts').doc(postId).update({
                likes: firebase.firestore.FieldValue.increment(1)
            });
        } else {
            button.classList.remove('liked');
            countSpan.innerText = Math.max(0, currentLikes - 1);
            forumLikesCache.set(postId, false);
            
            await db.collection('forum_post_likes').doc(snapshot.docs[0].id).delete();
            
            await db.collection('forum_posts').doc(postId).update({
                likes: firebase.firestore.FieldValue.increment(-1)
            });
        }
    } catch (error) {
        console.error('Erro ao curtir:', error);
        alert('Erro ao curtir. Tente novamente.');
    } finally {
        button.disabled = false;
    }
}

function shareForumPost(postId) {
    const postElement = document.getElementById('forum-post-' + postId);
    const text = postElement?.querySelector('.forum-post-content')?.innerText || 'Post do fórum';
    
    if (navigator.share) {
        navigator.share({

function loadProfile(userId = null) {
    const targetUserId = userId || auth.currentUser?.uid;
    if (!targetUserId) return;
    
    db.collection('users').doc(targetUserId).get().then(async doc => {
        const data = doc.data();
        userCache.set(targetUserId, data);
        
        document.getElementById('profileUsernameTop').innerText = data.username || '@usuario';
        document.getElementById('profileDisplayName').innerText = data.displayName || data.username?.replace('@', '') || 'Usuário';
        document.getElementById('profileFullName').innerText = data.displayName || '';
        
        const bioText = data.bio || 'Olá, estou usando BEAMOVE! 💪';
        document.getElementById('profileBio').innerHTML = makeMentionsClickable(bioText);
        
        document.getElementById('profileLinkText').innerText = data.link || 'Adicione seu link';
        document.getElementById('profileLink').href = data.link || '#';
        
        if (data.avatarUrl) {
            document.getElementById('profileAvatarText').style.display = 'none';
            const avatarImg = document.getElementById('profileAvatarImage');
            avatarImg.src = data.avatarUrl;
            avatarImg.style.display = 'block';
            avatarImg.style.width = '100%';
            avatarImg.style.height = '100%';
            avatarImg.style.objectFit = 'cover';
        } else {
            document.getElementById('profileAvatarText').style.display = 'flex';
            document.getElementById('profileAvatarImage').style.display = 'none';
            document.getElementById('profileAvatarText').innerText = data.displayName ? data.displayName.charAt(0).toUpperCase() : (data.username ? data.username.charAt(1).toUpperCase() : 'U');
        }
        
        const changeAvatarBtn = document.getElementById('changeAvatarBtn');
        if (targetUserId === auth.currentUser?.uid) {
            changeAvatarBtn.style.display = 'flex';
        } else {
            changeAvatarBtn.style.display = 'none';
        }
        
        const followersCount = await loadFollowersCount(targetUserId);
        const followingCount = await loadFollowingCount(targetUserId);
        document.getElementById('profileFollowers').innerText = followersCount;
        document.getElementById('profileFollowing').innerText = followingCount;
        
        if (targetUserId === auth.currentUser?.uid) {
            const actionBtn = document.getElementById('profileActionBtn');
            actionBtn.innerText = 'Editar perfil';
            actionBtn.className = 'profile-action-btn primary';
            actionBtn.onclick = toggleEditProfile;
        }
        
        const whatsappDDI = document.getElementById('whatsappDDI');
        if (whatsappDDI) whatsappDDI.value = data.whatsappDDI || '+351';
        const editWhatsApp = document.getElementById('editWhatsApp');
        if (editWhatsApp) editWhatsApp.value = data.whatsapp || '';
        const phoneDDI = document.getElementById('phoneDDI');

function loadProfilePosts(userId = null) {
    const targetUserId = userId || auth.currentUser?.uid;
    if (!targetUserId) return;
    
    db.collection('posts').where('user', '==', targetUserId).get().then(snapshot => {
        const grid = document.getElementById('profilePostsGrid');
        grid.innerHTML = '';
        if (snapshot.empty) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-gray);"><i data-lucide="camera" style="width: 48px; height: 48px; margin-bottom: 16px;"></i><p>Nenhum post ainda</p></div>';
            lucide.createIcons({
                attrs: {
                    fill: 'currentColor',
                    stroke: 'currentColor'
                }
            });
            return;
        }
        const posts = [];
        snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
        posts.sort((a, b) => {
            const dateA = a.created ? new Date(a.created.seconds * 1000) : new Date(0);
            const dateB = b.created ? new Date(b.created.seconds * 1000) : new Date(0);
            return dateB - dateA;
        });
        posts.forEach(post => {
            const postElement = document.createElement('div');
            postElement.className = 'post-thumb';
            postElement.onclick = () => goToPostInFeed(post.id);
            postElement.innerHTML = `
                <div class="post-thumb-content">
                    ${post.imageUrl ? `<img src="${post.imageUrl}" alt="Post">` : ''}
                    <i data-lucide="image"></i>
                    <p>${post.text ? post.text.substring(0, 20) + (post.text.length > 20 ? '...' : '') : '📷'}</p>
                    <div class="post-thumb-date">${formatDate(post.created)}</div>
                </div>
            `;
            grid.appendChild(postElement);
        });
        lucide.createIcons({
            attrs: {
                fill: 'currentColor',
                stroke: 'currentColor'
            }
        });
    }).catch(error => {
        console.error('Erro ao carregar posts do perfil:', error);
    });
}

function goToPostInFeed(postId) {

function calculateIMC() {
    const weight = parseFloat(document.getElementById('editWeight').value);
    const height = parseFloat(document.getElementById('editHeight').value);
    if (weight && height) {
        const imc = weight / Math.pow(height / 100, 2);
        document.getElementById('editImc').value = imc.toFixed(2);
    } else {
        document.getElementById('editImc').value = '';
    }
}

function saveUserCard() {
    const weight = parseFloat(document.getElementById('editWeight').value);
    const height = parseFloat(document.getElementById('editHeight').value);
    const age = parseInt(document.getElementById('editAge').value);
    const goal = document.getElementById('editGoal').value;
    const notes = document.getElementById('editNotes').value;
    
    if (isNaN(weight) || weight <= 0 || isNaN(height) || height <= 0 || isNaN(age) || age <= 0) {
        alert('Preencha valores válidos');
        return;
    }
    
    const btn = event.target;

function loadChat(chatId, otherUserId = null) {
    if (unsubscribeChat) unsubscribeChat();
    
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML = '<div style="text-align: center; padding: 40px;">Carregando...</div>';
    
    const user = auth.currentUser;
    
    if (chatId === 'geral') {
        unsubscribeChat = db.collection('chat').orderBy('created').onSnapshot(snapshot => {
            chatBox.innerHTML = '';
            if (snapshot.empty) {
                chatBox.innerHTML = '<div style="text-align: center; padding: 40px;">Nenhuma mensagem ainda.</div>';
                return;
            }
            snapshot.forEach(doc => displayMessage(doc.data(), doc.id));
            chatBox.scrollTop = chatBox.scrollHeight;
        }, console.error);
    } else {
        unsubscribeChat = db.collection('private_chats').where('participants', 'array-contains', user.uid)
            .onSnapshot(snapshot => {
                const messages = [];
                snapshot.forEach(doc => {
                    const message = doc.data();
                    if (message.participants && message.participants.includes(otherUserId)) {
                        messages.push({ id: doc.id, data: message });
                    }
                });
                messages.sort((a, b) => {
                    const dateA = a.data.created ? new Date(a.data.created.seconds * 1000) : new Date(0);
                    const dateB = b.data.created ? new Date(b.data.created.seconds * 1000) : new Date(0);
                    return dateA - dateB;
                });
                
                chatBox.innerHTML = '';
                if (messages.length === 0) {
                    chatBox.innerHTML = '<div style="text-align: center; padding: 40px;">Nenhuma mensagem ainda.</div>';
                } else {
                    messages.forEach(msg => displayMessage(msg.data, msg.id));
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            }, console.error);
    }
}

async function displayMessage(message, messageId) {
    try {
        let userData = userCache.get(message.user);
        if (!userData) {
            const userDoc = await db.collection('users').doc(message.user).get();
            userData = userDoc.data();
            userCache.set(message.user, userData);
        }
        
        const isOnline = isUserOnline(userData?.lastSeen);
        const onlineClass = isOnline ? 'online' : '';
        const displayName = userData?.displayName || userData?.username?.replace('@', '') || 'U';
        const isOwner = auth.currentUser && message.user === auth.currentUser.uid;
        
        let content = '';
        
        if (message.isAudio) {
            content = `
                <div class="message-audio">
                    <button class="audio-play-btn" id="play-btn-${messageId}" onclick="playAudio('${messageId}', '${message.audioUrl}')">
                        <i data-lucide="play"></i>
                    </button>
                    <div class="audio-wave" id="audio-${messageId}">
                        <div class="audio-wave-progress" id="audio-progress-${messageId}" style="width: 0%"></div>
                    </div>
                    <span class="audio-duration">${message.audioDuration}s</span>
                </div>
            `;
        } else {
            const messageText = makeMentionsClickable(message.text);
            content = `<p>${messageText}</p>`;
        }
        
        const messageElement = document.createElement('div');
        messageElement.className = message.user === auth.currentUser.uid ? 'message sent' : 'message';
        messageElement.id = `message-${messageId}`;
        
        messageElement.innerHTML = `
            <div class="message-avatar ${onlineClass}" onclick="viewProfile('${message.user}')">
                ${userData?.avatarUrl ? `<img src="${userData.avatarUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : displayName.charAt(0).toUpperCase()}
            </div>
            <div class="message-content">
                ${content}
                <span class="message-time">${formatTime(message.created)}</span>
            </div>
        `;
        
        if (isOwner) {
            messageElement.addEventListener('touchstart', (e) => {
                startMessageLongPress(messageId, messageElement);
            });
            messageElement.addEventListener('touchend', () => {
                cancelMessageLongPress();
            });
            messageElement.addEventListener('touchcancel', () => {
                cancelMessageLongPress();
            });
        }
        
        document.getElementById('chatBox').appendChild(messageElement);
        lucide.createIcons();
    } catch (error) {
        console.error('Erro ao exibir mensagem:', error);
    }
}

function selectChat(chatId, userName, userAvatar, userId = null) {
    currentChat = chatId;
    currentChatUser = userId;
    currentChatUserName = userName;
    currentChatUserAvatar = userAvatar;
    currentChatId = chatId;
    
    if (userId) markAsRead(userId);
    
    document.getElementById('chatHeaderName').innerText = userName;
    
    const userData = userId ? userCache.get(userId) : null;
    if (userData?.avatarUrl) {
        document.getElementById('chatHeaderAvatar').innerHTML = `<img src="${userData.avatarUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    } else {
        document.getElementById('chatHeaderAvatar').innerText = userAvatar;
    }
    
    if (userId) {
        updateChatHeaderStatus(userId);
        
        document.getElementById('chatHeaderName').onclick = () => viewProfile(userId);
        document.getElementById('chatHeaderAvatar').onclick = () => viewProfile(userId);
    } else {
        document.getElementById('chatHeaderStatus').innerText = 'Online';
        document.getElementById('chatHeaderAvatar').classList.remove('online');
        document.getElementById('chatHeaderName').onclick = null;
        document.getElementById('chatHeaderAvatar').onclick = null;
    }
    
    if (window.innerWidth <= 768) {
        document.getElementById('chatSidebar').classList.add('hidden-mobile');
        document.getElementById('chatMain').classList.add('active');
        document.getElementById('bottomNav').classList.add('hidden-nav');
    }
    
    document.querySelectorAll('.chat-user').forEach(item => {
        item.classList.remove('active');
        if (chatId === 'geral' && item.getAttribute('data-chat-id') === 'geral') {
            item.classList.add('active');
        } else if (item.getAttribute('data-user-id') === userId) {
            item.classList.add('active');
            item.classList.remove('unread');
            const badge = item.querySelector('.unread-badge');
            if (badge) badge.remove();
        }
    });
    
    loadChat(chatId, userId);
    
    const chatActions = document.getElementById('chatActions');
    chatActions.innerHTML = `
        <button class="message-bar-button" onclick="sendLike()">
            <i data-lucide="heart"></i>
        </button>
    `;
    document.getElementById('chatInput').value = '';
    document.getElementById('chatInput').style.height = 'auto';
    lucide.createIcons();
}

function markAsRead(userId) {
    if (!userId) return;
    const now = Date.now();
    lastReadTimestamps.set(userId, now);
    unreadMessages.set(userId, 0);
    const readData = JSON.parse(localStorage.getItem('readTimestamps') || '{}');
    readData[userId] = now;
    localStorage.setItem('readTimestamps', JSON.stringify(readData));
    updateUnreadBadges();
}

function updateUnreadBadges() {
    const usersList = document.getElementById('chatUsersList');
    const unreadTotal = document.getElementById('unreadTotal');
    let totalUnread = 0;
    
    unreadMessages.forEach((count, userId) => {
        totalUnread += count;
        const userItem = usersList?.querySelector(`[data-user-id="${userId}"]`);
        if (userItem) {
            if (count > 0) {
                userItem.classList.add('unread');
                let badge = userItem.querySelector('.unread-badge');
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'unread-badge';
                    userItem.querySelector('.chat-user-avatar').appendChild(badge);
                }
                badge.textContent = count;
            } else {
                userItem.classList.remove('unread');
                const badge = userItem.querySelector('.unread-badge');
                if (badge) badge.remove();
            }
        }
    });
    
    if (unreadTotal) {
        unreadTotal.textContent = totalUnread;
        unreadTotal.style.display = totalUnread > 0 ? 'inline' : 'none';
    }
}

function backToUsersList() {
    document.getElementById('chatSidebar').classList.remove('hidden-mobile');
    document.getElementById('chatMain').classList.remove('active');
    document.getElementById('bottomNav').classList.remove('hidden-nav');
    setTimeout(updateAllUsersOnlineStatus, 100);
}

function sendMessage() {
    const chatInput = document.getElementById('chatInput');
    const messageText = chatInput.value.trim();
    if (!messageText) return;
    
    const user = auth.currentUser;
    
    if (currentChat === 'geral') {
        db.collection('chat').add({
            text: messageText,
            user: user.uid,
            created: new Date()
        }).then(() => {
            chatInput.value = '';
            chatInput.style.height = 'auto';
            updateChatActions();
        }).catch(error => {
            alert('Erro: ' + error.message);
        });
    } else {
        db.collection('private_chats').add({
            text: messageText,
            user: user.uid,
            participants: [user.uid, currentChatUser].sort(),
            created: new Date()
        }).then(() => {
            chatInput.value = '';
            chatInput.style.height = 'auto';
            updateChatActions();
        }).catch(error => {
            alert('Erro: ' + error.message);
        });
    }
}

function handleChatKeyPress(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

// ============================================================
// FUNÇÕES DE BUSCA DE USUÁRIOS
// ============================================================

function loadAllUsers() {
    db.collection('users').get().then(snapshot => {
        allUsers = [];
        snapshot.forEach(doc => {
            if (doc.id !== auth.currentUser.uid) {
                userCache.set(doc.id, doc.data());
                allUsers.push({ id: doc.id, ...doc.data() });
            }
        });
    }).catch(console.error);
}

function showUserSearchModal() {
    document.getElementById('userSearchModal').classList.remove('hidden');
    document.getElementById('userSearchInput').value = '';
    document.getElementById('userSearchInput').focus();
    searchUsers();
}

function hideUserSearchModal() {
    document.getElementById('userSearchModal').classList.add('hidden');
}

function searchUsers() {
    const searchTerm = document.getElementById('userSearchInput').value.toLowerCase();
    const searchList = document.getElementById('userSearchList');
    
    const filteredUsers = allUsers.filter(user => user.username.toLowerCase().includes(searchTerm) || 
        (user.displayName && user.displayName.toLowerCase().includes(searchTerm)));
    
    if (filteredUsers.length === 0) {
        searchList.innerHTML = '<li class="no-users-found">Nenhum usuário encontrado</li>';
        return;
    }
    
    searchList.innerHTML = '';
    filteredUsers.forEach(user => {
        const displayName = user.displayName || user.username?.replace('@', '') || 'Usuário';
        const li = document.createElement('li');
        li.className = 'user-search-item';
        li.onclick = () => {
            hideUserSearchModal();
            selectChat(`private_${user.id}`, displayName, displayName.charAt(0).toUpperCase(), user.id);
        };
        li.innerHTML = `
            <div class="user-search-avatar" onclick="viewProfile('${user.id}')">
                ${user.avatarUrl ? `<img src="${user.avatarUrl}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : displayName.charAt(0).toUpperCase()}
            </div>
            <div class="user-search-info">
                <strong onclick="viewProfile('${user.id}')">${displayName}</strong>
                <span>${user.username || ''}</span>
            </div>
        `;
        searchList.appendChild(li);
    });
}

function formatDate(date) {
    if (!date) return 'Data desconhecida';
    let d;
    if (date && typeof date === 'object' && date.seconds) {
        d = new Date(date.seconds * 1000);
    } else if (date instanceof Date) {
        d = date;
    } else {
        return 'Data desconhecida';
    }
    const now = new Date();
    const diff = now - d;
    
    if (diff < 60000) return 'Agora mesmo';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' minutos atrás';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' horas atrás';
    if (diff < 604800000) return Math.floor(diff / 86400000) + ' dias atrás';
    return d.toLocaleDateString('pt-BR');
}

function formatTime(date) {
    if (!date) return '';
    let d;
    if (date && typeof date === 'object' && date.seconds) {
        d = new Date(date.seconds * 1000);
    } else if (date instanceof Date) {
        d = date;
    } else {
        return '';
    }
    const now = new Date();
    const diff = now - d;
    
    if (diff < 60000) return 'agora';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'min';
    if (diff < 86400000) return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function loadReadTimestamps() {
    const readData = JSON.parse(localStorage.getItem('readTimestamps') || '{}');
    Object.entries(readData).forEach(([userId, timestamp]) => lastReadTimestamps.set(userId, timestamp));
}

loadReadTimestamps();
